<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDO Strategist Hub 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sdo-teal: #78A49B;
            --sdo-pink: #F5C2C2;
            --sdo-yellow: #FEFE96;
        }
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .font-urbanist {
            font-family: 'Urbanist', sans-serif;
        }
        .text-justify {
            text-align: justify;
            text-justify: inter-word;
        }
        .node-pulse {
            animation: pulse-amber 2s infinite;
        }
        @keyframes pulse-amber {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 25px 10px rgba(245, 158, 11, 0.2); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .grid-pattern {
            background-image: radial-gradient(#475569 0.8px, transparent 0.8px);
            background-size: 50px 50px;
        }
        .dark .grid-pattern {
            background-image: radial-gradient(#f59e0b 0.8px, transparent 0.8px);
        }
        .bg-integration {
            background-color: #020617; /* slate-950 */
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-700 overflow-hidden">

    <!-- Barra de Progreso Superior -->
    <div class="fixed top-0 left-0 w-full h-1 bg-black/10 z-[100]">
        <div id="progress-bar" class="h-full bg-teal-500 transition-all duration-500" style="width: 16.66%"></div>
    </div>

    <!-- Cabecera -->
    <header class="fixed top-0 left-0 w-full p-6 flex justify-between items-center z-50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-xl border-b border-slate-200 dark:border-white/10">
        <div class="flex items-center gap-5">
            <div class="bg-slate-900 p-2.5 rounded-2xl shadow-xl border border-white/10 flex items-center justify-center min-w-[65px]">
                <img src="https://i.imgur.com/yyI6FWO.png" alt="Logo SDO" class="h-10 w-auto object-contain">
            </div>
            <div class="hidden md:block">
                <h1 class="text-base font-black uppercase tracking-tighter leading-none dark:text-white" id="header-title">SDO Strategist Hub</h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.25em] text-slate-500 dark:text-amber-400/90" id="header-subtitle">Sustentación Técnica 2026</p>
            </div>
        </div>

        <button onclick="toggleIntegrationMode()" class="flex items-center gap-3 px-7 py-3 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-slate-200 bg-white text-slate-600 shadow-md hover:scale-105 active:scale-95" id="integration-toggle">
            <i data-lucide="lightbulb" class="w-4 h-4"></i>
            <span>Ver Capas de Valor</span>
        </button>
    </header>

    <!-- Contenedor Principal -->
    <main class="h-screen flex flex-col items-center justify-center p-4 relative grid-pattern transition-all duration-1000" id="main-bg">
        
        <div id="slide-container" class="w-full max-w-7xl pt-20 pb-32">
            <!-- El contenido se inyecta dinámicamente -->
        </div>

    </main>

    <!-- Navegación Inferior -->
    <footer class="fixed bottom-0 left-0 w-full p-8 flex justify-between items-center z-50 bg-white/30 dark:bg-black/20 backdrop-blur-md border-t border-black/5 dark:border-white/5">
        <div class="flex gap-2.5" id="dots-container">
            <!-- Puntos de navegación -->
        </div>
        <div class="flex gap-5">
            <button onclick="prevSlide()" id="prev-btn" class="p-4 rounded-full border border-slate-300 dark:border-white/20 transition-all disabled:opacity-10 text-slate-600 dark:text-white hover:bg-white/20">
                <i data-lucide="chevron-left" class="w-7 h-7"></i>
            </button>
            <button onclick="nextSlide()" id="next-btn" class="flex items-center gap-5 px-12 py-5 rounded-full font-black uppercase text-[11px] tracking-widest shadow-2xl transition-all hover:scale-105 active:scale-95 bg-teal-600 text-white">
                <span id="next-text">Siguiente Pilar</span>
                <i data-lucide="chevron-right" class="w-6 h-6"></i>
            </button>
        </div>
    </footer>

    <!-- Modal de Ficha Técnica -->
    <div id="node-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-slate-950/90 backdrop-blur-xl">
        <div class="relative p-12 rounded-[3.5rem] max-w-xl w-full shadow-[0_0_50px_rgba(0,0,0,0.5)] border bg-white border-white transition-all duration-500 scale-90 opacity-0" id="modal-content">
            <button onclick="closeModal()" class="absolute top-10 right-10 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="x" class="w-7 h-7"></i>
            </button>
            
            <div id="modal-tag" class="inline-flex items-center gap-2.5 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-8">
                <i data-lucide="fingerprint" class="w-4 h-4"></i> Ficha de Integración SDO
            </div>
            
            <h3 id="modal-title" class="text-4xl font-black mb-5 leading-none tracking-tight text-slate-900">Proceso</h3>
            <p id="modal-desc" class="text-base mb-10 text-justify leading-relaxed font-medium text-slate-600">Descripción.</p>
            
            <div class="p-8 rounded-[2rem] space-y-5 mb-10 bg-slate-50 border border-slate-100" id="modal-info-box">
                <div class="flex items-start gap-4 text-left">
                    <div class="p-2.5 bg-indigo-500/10 rounded-xl text-indigo-500 mt-1"><i data-lucide="target" class="w-5 h-5"></i></div>
                    <div>
                        <span class="text-[11px] font-black block uppercase text-slate-400 mb-1">Foco Estratégico</span>
                        <span id="modal-vision" class="text-base font-bold text-slate-900 leading-tight">Visión.</span>
                    </div>
                </div>
            </div>

            <section class="p-8 rounded-[2.5rem] border-l-8 border-amber-500 text-left bg-amber-50" id="modal-challenge-box">
                <div class="flex items-center gap-2.5 font-black text-[11px] uppercase mb-3 tracking-widest text-amber-600">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i> Reto Identificado
                </div>
                <p id="modal-challenge" class="text-sm italic text-justify font-bold leading-relaxed text-amber-900">
                    "Reto."
                </p>
            </section>

            <button onclick="closeModal()" class="mt-12 w-full font-black py-5 rounded-[2rem] transition-all active:scale-95 text-sm uppercase tracking-widest bg-slate-900 text-white shadow-2xl" id="modal-close-btn">Cerrar e Integrar</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const detailedNodes = {
            root: { title: 'Subdirección Desarrollo Organizacional', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Dirección estratégica para asegurar que la cultura, la tecnología y el talento converjan en alta productividad interna.', vision: 'Puente crítico entre la visión ejecutiva y la ejecución operativa.', challenge: 'Superar el vacío de decisión entre los equipos que gestan ideas y la dirección que las aprueba.' },
            cultura: { title: 'Cultura, bienestar y experiencia', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Fortalecimiento de la cultura organizacional, cultura digital y la incorporación de la cultura de la felicidad.', vision: 'EX (Employee Experience) como pilar de desempeño.', challenge: 'Integrar el bienestar no como una actividad aislada, sino como un indicador de productividad real.' },
            equipo_psico: { title: 'Equipo psicosocial', color: 'bg-[#F5C2C2] text-[#4a1a1a]', desc: 'Apoyo integral al colaborador desde la salud mental y social para facilitar la Gestión del Cambio.', vision: 'Resiliencia humana ante la transformación.', challenge: 'Garantizar el acompañamiento psicosocial efectivo durante la adopción de nuevas herramientas y procesos.' },
            seleccion: { title: 'Selección de personal', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Captación de talento alineado a metodologías ágiles y cultura neuronal.', vision: 'Asegurar perfiles con ADN de cambio.', challenge: 'Evolucionar los criterios de selección hacia la adaptabilidad digital y el aprendizaje continuo.' },
            empleo_talento: { title: 'Agencia de Empleo y Gestión del Talento', color: 'bg-[#FEFE96] text-[#4a4a1a]', desc: 'Programa articulado a FOSFEC. Gestión y colocación de empleo para la Caja y empresas vinculadas.', vision: 'Socio de relacionamiento estratégico externo.', challenge: 'Convertir a la Caja en un aliado metodológico y referente digital para las empresas vinculadas, proveyendo marcos de trabajo modernos para la gestión del talento.' },
            desarrollo: { title: 'Desarrollo y formación', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Planes de formación alineados con las brechas detectadas en las Evaluaciones 360.', vision: 'Capacitación continua y escalabilidad.', challenge: 'Asegurar que la formación técnica habilite realmente la cultura neuronal y el uso de metodologías ágiles.' },
            innovacion: { title: 'Gestión de la Innovación', color: 'bg-[#FEFE96] text-[#4a4a1a]', desc: 'Creación de proyectos internos para el fortalecimiento de la cultura digital y agilidad.', vision: 'Motor de soluciones internas disruptivas.', challenge: 'Materializar la cultura neuronal potenciando los proyectos en metodologías ágiles.', isPulse: true },
            transformacion: { title: 'Transformación digital', color: 'bg-[#FEFE96] text-[#4a4a1a]', desc: 'Implementación del Modelo TED (Tecnología, Estrategia, Desempeño) para automatizar procesos.', vision: 'Fusión de productividad con automatización.', challenge: 'Eliminar tareas repetitivas mediante tecnología para liberar el potencial analítico del equipo.', isPulse: true },
            vector_cultura: { title: 'Vector Cultura', color: 'bg-[#F5C2C2] text-[#4a1a1a]', desc: 'Gestión del cambio transversal para la adopción de la transformación digital.', vision: 'Sustento cultural de la tecnología.', challenge: 'Reducir la resistencia al cambio y asegurar que la digitalización sea adoptada con propósito.' },
            competencias: { title: 'Gestión de competencias y efectividad', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Evaluaciones 360 e impacto en el desempeño dinámico.', vision: 'Equidad y estructura dinámica.', challenge: 'Mantener manuales de funciones actualizados y alineados a las nuevas exigencias de la era digital.' },
            historias: { title: 'Historias Laborales', color: 'bg-[#F5C2C2] text-[#4a1a1a]', desc: 'Trazabilidad digital del ciclo de vida del colaborador.', vision: 'Datos centralizados para gestión humana.', challenge: 'Lograr la digitalización total de expedientes para habilitar el People Analytics.' },
            nomina: { title: 'Nómina y seguridad social', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Gestión eficiente de compensaciones bajo marcos de agilidad.', vision: 'Transparencia y soporte prestacional.', challenge: 'Automatizar flujos de pago para integrarlos al modelo de productividad institucional.' },
            relaciones: { title: 'Relaciones laborales', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Gestión de acuerdos bajo enfoques de cultura neuronal.', vision: 'Seguridad jurídica y diálogo constructivo.', challenge: 'Modernizar los acuerdos laborales para soportar modalidades de trabajo flexibles e híbridas.' },
            control: { title: 'Control Disciplinario', color: 'bg-[#F5C2C2] text-[#4a1a1a]', desc: 'Seguimiento preventivo basado en los valores de la Caja.', vision: 'Ética y conducta organizacional.', challenge: 'Migrar de un enfoque punitivo a uno preventivo y pedagógico basado en la cultura.' },
            negociaciones: { title: 'Negociaciones Colectivas', color: 'bg-[#F5C2C2] text-[#4a1a1a]', desc: 'Articulación grupal para la evolución organizacional.', vision: 'Sinergia grupal y bienestar común.', challenge: 'Vincular los objetivos de madurez digital con las metas compartidas en los acuerdos colectivos.' },
            productividad: { title: 'Productividad', color: 'bg-[#78A49B] text-[#1a2e2a]', desc: 'Apoyo metodológico transversal a proyectos PMO.', vision: 'Eficiencia operativa sistémica.', challenge: 'Convertir la productividad en una métrica objetiva basada en datos derivados de procesos automatizados.' }
        };

        const slides = [
            { id: 'vision', title: 'Propuesta Estratégica SDO', subtitle: 'Consolidación de la Subdirección de Desarrollo Organizacional', content: 'La creación de la Subdirección de Desarrollo Organizacional (SDO) no es una simple reestructuración, sino un imperativo estratégico para garantizar que el crecimiento de la organización sea sostenible, ágil y centrado en el talento. Esta subdirección se posiciona como el puente crítico entre la visión ejecutiva y la ejecución operativa, asegurando que la cultura, la tecnología y el talento converjan en resultados de alta productividad.', icon: 'sparkles', isDark: true, points: ['Cultura Neuronal Ágil', 'Modelo TED', 'Employee Experience'] },
            { id: 'justificacion', title: 'Justificación Estratégica', subtitle: 'Razones de la Separación Necesaria', content: 'Tradicionalmente, el desarrollo organizacional ha sido absorbido por la Subdirección Administrativa, lo que limita su alcance a tareas de cumplimiento y soporte. La separación es necesaria por las siguientes razones clave: Enfoque Diferenciado (potenciación humana proactiva), Agilidad de Decisión (eliminación de cuellos de botella) y Especialización Metodológica (liderazgo con ADN de cambio).', icon: 'network', isDark: false, adminTags: ['Enfoque Diferenciado', 'Agilidad de Decisión', 'Especialización Metodológica'] },
            { id: 'blueprint', title: 'Blueprint Organizacional', subtitle: 'Arquitectura de Procesos Integrados', content: 'Visualiza cómo se entrelazan los procesos internos para lograr la madurez digital. Haz clic en los nodos para ver sus retos específicos dentro de la nueva estructura organizacional diseñada para la Caja.', icon: 'layers', isMap: true, isDark: false },
            { id: 'pmo', title: 'Soporte Transversal PMO', subtitle: 'El Corazón Metodológico', content: 'La SDO asegura que cada proyecto de la PMO tenga éxito cultural mediante acompañamiento en la adopción de herramientas, asegurando que la agilidad no sea solo una palabra sino una realidad operativa que conecte ideas con ejecución.', icon: 'brain-circuit', isDark: false, highlights: [{label:'Gestión del Cambio', desc:'Garantizar la adopción tecnológica.'}, {label:'Cultura Neuronal', desc:'Implementar agilidad real en equipos.'}, {label:'Cierre de Brechas', desc:'Eliminar el vacío entre ideas y ejecución.'}] },
            { id: 'ted', title: 'Modelo TED: Productividad + Automatización', subtitle: 'Corazón de la Innovación SDO', content: 'La necesidad de fusionar las estrategias de productividad con la automatización es el corazón de la innovación de esta subdirección, permitiendo una eficiencia real basada en datos.', icon: 'cpu', labels: ['Optimización de Procesos (TED)', 'Eficiencia Medible', 'Articulación del Proceso Ágil y Toma de Decisiones'], isDark: true, isChart: true },
            { id: 'conclusion', title: 'Resultados e Impacto', subtitle: 'Valor Organizacional 2026', content: 'Una estructura diseñada para reducir la rotación mediante una EX superior, acelerar la transformación digital eliminando la resistencia al cambio y aumentar la eficiencia operativa a través de la automatización estratégica TED.', icon: 'trending-up', points: ['Eficiencia Medible', 'Alineación Cultural', 'Madurez Digital'], isDark: true }
        ];

        // --- ESTADO ---
        let currentSlideIndex = 0;
        let integrationMode = false;

        // --- ELEMENTOS ---
        const slideContainer = document.getElementById('slide-container');
        const progressBar = document.getElementById('progress-bar');
        const dotsContainer = document.getElementById('dots-container');
        const nextText = document.getElementById('next-text');
        const nextBtn = document.getElementById('next-btn');

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            renderSlide();
            renderDots();
            lucide.createIcons();
        };

        // --- FUNCIONES ---
        function toggleIntegrationMode() {
            integrationMode = !integrationMode;
            const btn = document.getElementById('integration-toggle');
            if(integrationMode) {
                document.body.classList.add('dark');
                btn.className = "flex items-center gap-3 px-7 py-3 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-amber-400 bg-amber-500 text-white shadow-[0_0_20px_rgba(245,158,11,0.4)]";
                btn.querySelector('span').innerText = 'Sinergias Activas';
            } else {
                document.body.classList.remove('dark');
                btn.className = "flex items-center gap-3 px-7 py-3 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-slate-200 bg-white text-slate-600 shadow-md";
                btn.querySelector('span').innerText = 'Ver Capas de Valor';
            }
            renderSlide();
        }

        function renderDots() {
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                const isActive = i === currentSlideIndex;
                dot.className = `w-2 h-2 rounded-full transition-all duration-500 ${isActive ? (integrationMode ? 'bg-amber-500 w-10' : 'bg-teal-500 w-10') : 'bg-slate-400/30'}`;
                dotsContainer.appendChild(dot);
            });
        }

        function renderSlide() {
            const slide = slides[currentSlideIndex];
            const isDark = integrationMode || slide.isDark;
            
            // Colores globales
            document.body.className = `min-h-screen flex flex-col transition-all duration-1000 font-sans ${isDark ? 'bg-integration text-slate-100' : 'bg-slate-50 text-slate-900'}`;
            document.getElementById('header-title').className = `text-base font-black uppercase tracking-tighter leading-none ${isDark ? 'text-white' : 'text-slate-900'}`;
            
            // Barra de Progreso
            progressBar.style.width = `${((currentSlideIndex + 1) / slides.length) * 100}%`;
            
            // Botones
            nextText.innerText = currentSlideIndex === slides.length - 1 ? 'Finalizar Propuesta' : 'Siguiente Pilar';
            nextBtn.className = `flex items-center gap-5 px-12 py-5 rounded-full font-black uppercase text-[11px] tracking-widest shadow-2xl transition-all hover:scale-105 active:scale-95 ${integrationMode ? 'bg-amber-500 text-white' : 'bg-teal-600 text-white'}`;

            let visualHtml = '';
            if (slide.isMap) visualHtml = buildMapTemplate(isDark);
            else if (slide.adminTags) visualHtml = buildComparison(isDark, slide.adminTags);
            else if (slide.highlights) visualHtml = buildHighlights(isDark, slide.highlights);
            else if (slide.isChart) visualHtml = buildChart(isDark, slide.labels);
            else if (slide.points) visualHtml = buildPoints(isDark, slide.points);

            slideContainer.innerHTML = `
                <div class="grid grid-cols-1 ${slide.isMap ? '' : 'md:grid-cols-2'} gap-12 items-center fade-in">
                    <div class="${slide.isMap ? 'text-center mb-10' : 'space-y-10'}">
                        <div class="flex items-center gap-6 ${slide.isMap ? 'justify-center' : ''}">
                            <div class="p-4 rounded-3xl backdrop-blur-xl shadow-2xl border ${isDark ? 'bg-white/10 border-white/20' : 'bg-white border-slate-100'}">
                                <i data-lucide="${slide.icon}" class="w-14 h-14 ${isDark ? 'text-amber-400' : 'text-teal-600'}"></i>
                            </div>
                            <div class="text-left">
                                <span class="text-[11px] font-black uppercase tracking-[0.4em] ${isDark ? 'text-amber-400/80' : 'text-slate-400'}">Estrategia 2026</span>
                                <h1 class="text-4xl md:text-6xl font-black leading-none tracking-tighter ${isDark ? 'text-white' : 'text-slate-900'}">${slide.title}</h1>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold ${isDark ? 'text-amber-400' : 'text-teal-700'}">${slide.subtitle}</h2>
                        <p class="text-lg md:text-xl text-justify leading-relaxed ${slide.isMap ? 'max-w-5xl mx-auto' : 'max-w-lg'} ${isDark ? 'text-slate-300' : 'text-slate-600'}">${slide.content}</p>
                    </div>
                    <div class="relative w-full">
                        ${visualHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
            renderDots();
        }

        function buildMapTemplate(isDark) {
            return `
                <div class="rounded-[3rem] p-10 border shadow-[0_30px_100px_rgba(0,0,0,0.1)] transition-all duration-1000 ${isDark ? 'bg-white/5 border-white/10' : 'bg-white/90 backdrop-blur-xl border-slate-200'} overflow-x-auto">
                    <div class="min-w-[900px] flex flex-col items-center">
                        <div class="w-full flex justify-center mb-16">
                            ${buildNode('root')}
                        </div>
                        <div class="relative w-full flex justify-center gap-32">
                            <div class="absolute left-1/2 top-0 bottom-0 w-[2px] -translate-x-1/2 transition-colors ${isDark ? 'bg-indigo-500/30' : 'bg-slate-300'}"></div>
                            
                            <div class="flex flex-col gap-12 items-end w-1/2 relative z-10">
                                <div class="flex items-center gap-4">
                                    ${buildNode('equipo_psico')} <i data-lucide="arrow-left" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('cultura')}
                                </div>
                                <div class="flex items-center gap-4">
                                    ${buildNode('empleo_talento')} <div class="w-10 border-t-2 border-dashed ${isDark ? 'border-indigo-400/30' : 'border-slate-300'}"></div> <i data-lucide="arrow-left" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('seleccion')}
                                </div>
                                ${buildNode('desarrollo')}
                                
                                <div class="flex flex-col items-end gap-5 p-6 rounded-[2.5rem] border-2 border-dashed transition-all ${isDark ? 'border-indigo-500/40 bg-indigo-500/5' : 'border-slate-300 bg-black/5'}">
                                    <Node id="innovacion" class="flex flex-col items-center gap-4">
                                        ${buildNode('innovacion')}
                                        <div class="h-4"></div>
                                        ${buildNode('transformacion')}
                                    </Node>
                                    <div class="flex items-center gap-4 pr-12">
                                        <i data-lucide="arrow-left" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> <div class="w-10 border-t-2 border-dashed ${isDark ? 'border-indigo-400/30' : 'border-slate-300'}"></div> ${buildNode('vector_cultura')}
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col gap-12 items-start w-1/2 relative z-10">
                                <div class="flex items-center gap-4">
                                    ${buildNode('competencias')} <i data-lucide="arrow-right" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('historias')}
                                </div>
                                ${buildNode('nomina')}
                                <div class="flex gap-6 items-start">
                                    ${buildNode('relaciones')}
                                    <div class="flex flex-col gap-4 border-l-2 pl-6 transition-colors ${isDark ? 'border-indigo-500/30' : 'border-slate-300'}">
                                        ${buildNode('control')}
                                        ${buildNode('negociaciones')}
                                    </div>
                                </div>
                                ${buildNode('productividad')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildNode(id) {
            const node = detailedNodes[id];
            const isRoot = id === 'root';
            return `<div onclick="openModal('${id}')" class="relative px-6 py-3 rounded-2xl shadow-xl border border-black/10 text-[10px] font-black uppercase cursor-pointer transition-all duration-500 hover:scale-110 flex flex-col items-center justify-center min-h-[55px] ${isRoot ? 'w-[320px] py-6 text-xs ring-4 ring-white/10' : 'w-[180px]'} ${integrationMode && node.isPulse ? 'node-pulse border-amber-400' : ''} ${node.color}">
                <span class="leading-tight text-center">${node.title}</span>
            </div>`;
        }

        function buildComparison(isDark, tags) {
            return `<div class="space-y-6 fade-in">
                <div class="p-8 rounded-[2.5rem] border border-slate-200 bg-slate-100/50 opacity-60">
                    <div class="text-[11px] font-black uppercase mb-4 text-slate-500">Gestión Administrativa</div>
                    <div class="flex flex-wrap gap-3">${tags.map(t => `<span class="px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-800 shadow-sm">${t}</span>`).join('')}</div>
                </div>
                <div class="flex justify-center -my-3 relative z-10"><div class="bg-teal-600 text-white p-3 rounded-full shadow-2xl"><i data-lucide="arrow-down" class="w-8 h-8"></i></div></div>
                <div class="p-10 rounded-[3.5rem] border-2 border-amber-500 bg-amber-500/5 shadow-2xl shadow-amber-500/10">
                    <div class="text-[11px] font-black uppercase text-amber-500 mb-4 tracking-widest">Subdirección de Desarrollo Organizacional</div>
                    <div class="flex flex-wrap gap-3">
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">Enfoque Proactivo</span>
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">Interlocución Directa</span>
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">ADN Metodológico</span>
                    </div>
                </div>
            </div>`;
        }

        function buildHighlights(isDark, items) {
            return `<div class="space-y-5 fade-in">${items.map((h, i) => `
                <div class="p-6 rounded-[2rem] shadow-2xl flex gap-6 items-center transition-all hover:scale-105 ${isDark ? 'bg-white/5 border border-white/10' : 'bg-white border-slate-100'}">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl ${isDark ? 'bg-amber-500 text-white' : 'bg-indigo-100 text-indigo-600'}">${i + 1}</div>
                    <div class="text-left"><div class="font-black text-lg ${isDark ? 'text-white' : 'text-slate-900'}">${h.label}</div><div class="text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'} font-medium">${h.desc}</div></div>
                </div>
            `).join('')}</div>`;
        }

        function buildChart(isDark, labels) {
            return `<div class="p-12 rounded-[4rem] border transition-all duration-1000 ${isDark ? 'bg-amber-900/10 border-amber-500/30' : 'bg-white border-slate-200 shadow-[0_40px_100px_rgba(0,0,0,0.1)]'}">
                <div class="flex flex-col gap-5 mb-10">${labels.map(l => `
                    <div class="flex items-center gap-5 p-5 rounded-3xl border ${isDark ? 'bg-white/5 border-white/10 text-white' : 'bg-slate-50 border-slate-100 text-slate-800'}">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-500 font-black"><i data-lucide="check" class="w-5 h-5"></i></div>
                        <span class="text-base font-black text-justify leading-snug">${l}</span>
                    </div>`).join('')}</div>
                <div class="flex justify-between items-end gap-5 h-40 px-6">
                    ${[40, 65, 55, 100].map((h, i) => `
                        <div class="flex-1 flex flex-col items-center gap-3">
                            <div class="w-full rounded-t-2xl transition-all duration-1000 ${i === 3 ? (isDark ? 'bg-amber-500 shadow-[0_0_30px_rgba(245,158,11,0.5)]' : 'bg-emerald-500 animate-pulse') : 'bg-slate-300/30'}" style="height: ${h}%"></div>
                            <span class="text-[9px] font-black uppercase ${isDark ? 'text-white/40' : 'text-slate-400'} tracking-widest">Nivel ${i+1}</span>
                        </div>`).join('')}
                </div>
            </div>`;
        }

        function buildPoints(isDark, points) {
            return `<div class="grid grid-cols-1 gap-6 fade-in">${points.map(p => `
                <div class="p-7 rounded-[2.5rem] flex items-center gap-6 border shadow-xl transition-all ${isDark ? 'bg-white/5 border-white/10 text-white' : 'bg-white border-slate-100 text-slate-800'}">
                    <div class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center text-teal-600 font-black"><i data-lucide="zap" class="w-6 h-6"></i></div>
                    <span class="font-black text-lg text-justify leading-tight">${p}</span>
                </div>`).join('')}</div>`;
        }

        // --- NAVEGACIÓN ---
        function nextSlide() { if (currentSlideIndex < slides.length - 1) { currentSlideIndex++; renderSlide(); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        // --- MODAL ---
        function openModal(id) {
            const node = detailedNodes[id];
            const isDark = integrationMode || slides[currentSlideIndex].isDark;
            const modal = document.getElementById('node-modal');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = node.title;
            document.getElementById('modal-desc').innerText = node.desc;
            document.getElementById('modal-vision').innerText = node.vision;
            document.getElementById('modal-challenge').innerText = node.challenge;
            document.getElementById('modal-tag').className = `inline-flex items-center gap-2.5 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-8 ${node.color}`;

            if(isDark) {
                content.className = "relative p-12 rounded-[3.5rem] max-w-xl w-full shadow-2xl border bg-slate-900 border-amber-500/30 text-white transition-all duration-500 scale-100 opacity-100";
                document.getElementById('modal-title').className = "text-4xl font-black mb-5 leading-none tracking-tight text-white";
                document.getElementById('modal-desc').className = "text-base mb-10 text-justify leading-relaxed font-medium text-slate-300";
                document.getElementById('modal-vision').className = "text-base font-bold text-white";
                document.getElementById('modal-info-box').className = "p-8 rounded-[2rem] space-y-5 mb-10 bg-white/5 border border-white/10";
                document.getElementById('modal-challenge-box').className = "p-8 rounded-[2.5rem] border-l-8 border-amber-500 text-left bg-amber-500/10";
                document.getElementById('modal-close-btn').className = "mt-12 w-full font-black py-5 rounded-[2rem] transition-all active:scale-95 text-sm uppercase tracking-widest bg-amber-500 text-white shadow-xl shadow-amber-500/20";
            } else {
                content.className = "relative p-12 rounded-[3.5rem] max-w-xl w-full shadow-2xl border bg-white border-white transition-all duration-500 scale-100 opacity-100";
                document.getElementById('modal-title').className = "text-4xl font-black mb-5 leading-none tracking-tight text-slate-900";
                document.getElementById('modal-desc').className = "text-base mb-10 text-justify leading-relaxed font-medium text-slate-600";
                document.getElementById('modal-vision').className = "text-base font-bold text-slate-900";
                document.getElementById('modal-info-box').className = "p-8 rounded-[2rem] space-y-5 mb-10 bg-slate-50 border border-slate-100";
                document.getElementById('modal-challenge-box').className = "p-8 rounded-[2.5rem] border-l-8 border-amber-500 text-left bg-amber-50";
                document.getElementById('modal-close-btn').className = "mt-12 w-full font-black py-5 rounded-[2rem] transition-all active:scale-95 text-sm uppercase tracking-widest bg-slate-900 text-white shadow-2xl";
            }

            modal.classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-90');
            document.getElementById('modal-content').classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                document.getElementById('node-modal').classList.replace('flex', 'hidden');
                document.getElementById('modal-content').classList.replace('scale-90', 'scale-100');
                document.getElementById('modal-content').classList.replace('opacity-0', 'opacity-100');
            }, 300);
        }
    </script>
</body>
</html>
