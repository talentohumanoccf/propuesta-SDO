<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Estrategica SDO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sdo-teal: #78A49B;
            --sdo-pink: #F5C2C2;
            --sdo-yellow: #FEFE96;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            /* Permitimos el scroll vertical */
            overflow-x: hidden;
            overflow-y: auto;
        }
        h1, h2, h3, .font-urbanist {
            font-family: 'Urbanist', sans-serif;
        }
        .text-justify {
            text-align: justify;
            text-justify: inter-word;
        }
        .node-pulse {
            animation: pulse-amber 2s infinite;
        }
        @keyframes pulse-amber {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 25px 10px rgba(245, 158, 11, 0.2); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .grid-pattern {
            background-image: radial-gradient(#475569 0.8px, transparent 0.8px);
            background-size: 50px 50px;
        }
        .dark .grid-pattern {
            background-image: radial-gradient(#f59e0b 0.8px, transparent 0.8px);
        }
        .bg-integration {
            background-color: #020617; /* slate-950 */
        }
        /* Estilo para los botones de navegación laterales fijos */
        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }
        .dark .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border: 2px solid transparent; background-clip: content-box; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-700 min-h-screen">

    <!-- Barra de Progreso Superior Fija -->
    <div class="fixed top-0 left-0 w-full h-1 bg-black/10 z-[100]">
        <div id="progress-bar" class="h-full bg-teal-500 transition-all duration-500" style="width: 16.66%"></div>
    </div>

    <!-- Cabecera Fija -->
    <header class="fixed top-0 left-0 w-full p-5 flex justify-between items-center z-50 bg-white/60 dark:bg-slate-950/60 backdrop-blur-md border-b border-slate-200/50 dark:border-white/5">

            </div>
            <div class="hidden md:block">

            </div>
        </div>

        <button onclick="toggleIntegrationMode()" class="flex items-center gap-3 px-6 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-slate-200 bg-white/90 text-slate-600 shadow-md hover:scale-105 active:scale-95" id="integration-toggle">
            <i data-lucide="lightbulb" class="w-4 h-4"></i>
            <span>Ver Capas de Valor</span>

    </header>

    <!-- Botones de Navegación Lateral Fijos -->
    <button onclick="prevSlide()" id="prev-btn-side" class="fixed left-6 top-1/2 -translate-y-1/2 z-[60] p-4 rounded-full nav-btn border border-black/5 text-slate-400 hover:text-teal-600 dark:hover:text-amber-400 opacity-0 pointer-events-none">
        <i data-lucide="chevron-left" class="w-8 h-8"></i>
    </button>

    <button onclick="nextSlide()" id="next-btn-side" class="fixed right-6 top-1/2 -translate-y-1/2 z-[60] p-4 rounded-full nav-btn border border-black/5 text-slate-400 hover:text-teal-600 dark:hover:text-amber-400">
        <i data-lucide="chevron-right" class="w-8 h-8"></i>
    </button>

    <!-- Indicador de Puntos Flotante Fijo -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-3 px-6 py-3 rounded-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-lg border border-black/5 dark:border-white/10" id="dots-container">
        <!-- Puntos generados por JS -->
    </div>

    <!-- Contenedor Principal (Permite crecimiento vertical) -->
    <main class="min-h-screen flex flex-col items-center justify-center p-4 pt-32 pb-32 relative grid-pattern transition-all duration-1000" id="main-bg">
        <div id="slide-container" class="w-full max-w-7xl">
            <!-- Contenido dinámico -->
        </div>
    </main>

    <!-- Modal de Ficha Técnica -->
    <div id="node-modal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-slate-950/95 backdrop-blur-xl">

            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div id="modal-tag" class="inline-flex items-center gap-2.5 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-8">
                <i data-lucide="fingerprint" class="w-4 h-4"></i> Ficha de Integración SDO
            </div>
            <h3 id="modal-title" class="text-3xl font-black mb-4 leading-none tracking-tight text-slate-900">Proceso</h3>
            <p id="modal-desc" class="text-base mb-10 text-justify leading-relaxed font-medium text-slate-600">Descripción.</p>
            <div class="p-6 rounded-[2rem] space-y-5 mb-10 bg-slate-50 border border-slate-100" id="modal-info-box">
                <div class="flex items-start gap-4 text-left">
                    <div class="p-2.5 bg-indigo-500/10 rounded-xl text-indigo-500 mt-1"><i data-lucide="target" class="w-5 h-5"></i></div>
                    <div>
                        <span class="text-[11px] font-black block uppercase text-slate-400 mb-1">Foco Estratégico</span>
                        <span id="modal-vision" class="text-base font-bold text-slate-900 leading-tight">Visión.</span>
                    </div>
                </div>
            </div>
            <section class="p-6 rounded-[2rem] border-l-8 border-amber-500 text-left bg-amber-50" id="modal-challenge-box">
                <div class="flex items-center gap-2.5 font-black text-[11px] uppercase mb-3 tracking-widest text-amber-600">

            </section>
            <button onclick="closeModal()" class="mt-10 w-full font-black py-5 rounded-[2rem] transition-all active:scale-95 text-sm uppercase tracking-widest bg-slate-900 text-white shadow-xl" id="modal-close-btn">Cerrar e Integrar</button>
        </div>
    </div>

            document.addEventListener('keydown', (e) => {
                if(e.key === "ArrowRight") nextSlide();
                if(e.key === "ArrowLeft") prevSlide();
            });
        };

        function toggleIntegrationMode() {
            integrationMode = !integrationMode;
            const btn = document.getElementById('integration-toggle');
            document.body.classList.toggle('dark', integrationMode);
            if(integrationMode) {
                btn.className = "flex items-center gap-3 px-6 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-amber-400 bg-amber-500 text-white shadow-lg";
                btn.querySelector('span').innerText = 'Sinergias Activas';
            } else {
                btn.className = "flex items-center gap-3 px-6 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all border border-slate-200 bg-white/90 text-slate-600 shadow-md";
                btn.querySelector('span').innerText = 'Ver Capas de Valor';
            }
            renderSlide();
        }

        function renderSlide() {
            const slide = slides[currentSlideIndex];
            const isDark = integrationMode || slide.isDark;
            
            document.body.className = `transition-all duration-1000 font-sans ${isDark ? 'bg-integration text-slate-100' : 'bg-slate-50 text-slate-900'} min-h-screen`;
            document.getElementById('header-title').className = `text-base font-black uppercase tracking-tighter leading-none ${isDark ? 'text-white' : 'text-slate-900'}`;
            progressBar.style.width = `${((currentSlideIndex + 1) / slides.length) * 100}%`;
            
            prevBtnSide.style.opacity = currentSlideIndex === 0 ? "0" : "1";
            prevBtnSide.style.pointerEvents = currentSlideIndex === 0 ? "none" : "auto";
            nextBtnSide.style.opacity = currentSlideIndex === slides.length - 1 ? "0" : "1";
            nextBtnSide.style.pointerEvents = currentSlideIndex === slides.length - 1 ? "none" : "auto";

            let visualHtml = '';
            if (slide.isMap) visualHtml = buildMapTemplate(isDark);
            else if (slide.isRadialMap) visualHtml = buildRadialMapTemplate(isDark);
            else if (slide.isTEDVisual) visualHtml = buildTEDVisual(isDark);
            else if (slide.adminTags) visualHtml = buildComparison(isDark, slide.adminTags);
            else if (slide.highlights) visualHtml = buildHighlights(isDark, slide.highlights);
            else if (slide.isChart) visualHtml = buildChart(isDark, slide.labels);
            else if (slide.points) visualHtml = buildPoints(isDark, slide.points);
            
            const isFullWidthMap = slide.isMap || slide.isRadialMap;

            slideContainer.innerHTML = `
                <div class="grid grid-cols-1 ${isFullWidthMap ? '' : 'md:grid-cols-2'} gap-12 items-start fade-in px-4 md:px-12">
                    <div class="${isFullWidthMap ? 'text-center mb-10' : 'space-y-10 md:sticky md:top-32'}">
                        <div class="flex items-center gap-6 ${isFullWidthMap ? 'justify-center' : ''}">
                            <div class="p-4 rounded-3xl backdrop-blur-xl shadow-2xl border ${isDark ? 'bg-white/10 border-white/20' : 'bg-white border-slate-100'}">
                                <i data-lucide="${slide.icon}" class="w-14 h-14 ${isDark ? 'text-amber-400' : 'text-teal-600'}"></i>
                            </div>
                            <div class="text-left">
                                <span class="text-[11px] font-black uppercase tracking-[0.4em] ${isDark ? 'text-amber-400/80' : 'text-slate-400'}">Estrategia 2026</span>
                                <h1 class="text-4xl md:text-5xl font-black leading-none tracking-tighter ${isDark ? 'text-white' : 'text-slate-900'}">${slide.title}</h1>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold ${isDark ? 'text-amber-400' : 'text-teal-700'}">${slide.subtitle}</h2>
                        <p class="text-lg md:text-xl text-justify leading-relaxed ${isDark ? 'text-slate-300' : 'text-slate-600'}">${slide.content}</p>
                    </div>
                    <div class="relative w-full">
                        ${visualHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
            renderDots();
        }

        function renderDots() {
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                const isActive = i === currentSlideIndex;
                dot.className = `w-2 h-2 rounded-full transition-all duration-500 cursor-pointer ${isActive ? (integrationMode ? 'bg-amber-500 w-10' : 'bg-teal-500 w-10') : 'bg-slate-400/30 hover:bg-slate-400'}`;
                dot.onclick = () => { currentSlideIndex = i; renderSlide(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                dotsContainer.appendChild(dot);
            });
        }

        function buildRadialMapTemplate(isDark) {
            return `
                <div class="rounded-[4rem] p-12 border shadow-[0_32px_120px_-10px_rgba(0,0,0,0.15)] transition-all duration-1000 ${isDark ? 'bg-slate-900/50 border-white/10 backdrop-blur-3xl' : 'bg-white/90 backdrop-blur-2xl border-slate-200'} overflow-visible">
                    
                    <div class="relative w-full max-w-[900px] h-[750px] mx-auto flex items-center justify-center">
                        
                        <!-- LÍNEAS DE CONEXIÓN SVG (FONDO) -->
                        <svg class="absolute inset-0 w-full h-full pointer-events-none opacity-20" viewBox="0 0 900 750">
                            <!-- Círculos concéntricos -->
                            <circle cx="450" cy="375" r="120" fill="none" class="${isDark ? 'stroke-amber-400' : 'stroke-indigo-400'}" stroke-width="1" stroke-dasharray="10 10" />
                            <circle cx="450" cy="375" r="280" fill="none" class="${isDark ? 'stroke-slate-700' : 'stroke-slate-200'}" stroke-width="2" />

                            <line x1="450" y1="375" x2="100" y2="375" class="${isDark ? 'stroke-blue-500' : 'stroke-blue-300'}" stroke-width="2" stroke-dasharray="5 5" />
                            <line x1="450" y1="375" x2="800" y2="375" class="${isDark ? 'stroke-emerald-500' : 'stroke-emerald-300'}" stroke-width="2" stroke-dasharray="5 5" />

                        <!-- NODO CENTRAL (LÍDER) -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 flex flex-col items-center gap-4">
                            ${buildRadialNode('n_sdo')}

                            ${buildRadialNode('n_lider')}

                        <!-- ALIADOS EXTERNOS (ESQUINAS) -->
                        <div class="absolute top-0 right-0 flex flex-col gap-4 items-end slide-up">

                        </div>
                        <div class="absolute bottom-0 left-0 flex flex-col gap-4 items-start">
                            ${buildRadialNode('n_agencia')}
                            <div class="text-[10px] font-black uppercase text-amber-500 tracking-widest ml-4">Aliado en Atracción y Relacionamiento</div>
                        </div>

                        <!-- 3 NODOS CARDINALES -->
                        
                        <!-- NORTE (1. INTEGRACIÓN) -->
                        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[350px] p-6 rounded-[3rem] border-2 shadow-xl hover:scale-105 transition-all duration-500 cursor-pointer ${isDark ? 'bg-indigo-950/40 border-indigo-400/30' : 'bg-indigo-50/90 border-indigo-200'}" onclick="openModal('n_integracion')">
                            <h3 class="font-black text-center mb-4 text-[13px] uppercase tracking-widest ${isDark ? 'text-indigo-400' : 'text-indigo-900'}">1. Integración</h3>
                            <div class="flex flex-col gap-2 scale-90">
                                ${buildRadialNode('n_rol_integrador')} ${buildRadialNode('n_analitica_tec')} ${buildRadialNode('n_rel_lab_norm')}
                            </div>
                        </div>

                        <!-- OESTE (2. DESARROLLO Y EXP) -->
                        <div class="absolute top-1/2 left-0 -translate-y-1/2 w-[380px] p-6 rounded-[3rem] border-2 shadow-xl hover:scale-105 transition-all duration-500 cursor-pointer ${isDark ? 'bg-blue-950/40 border-blue-400/30' : 'bg-blue-50/90 border-blue-200'}" onclick="openModal('n_desarrollo_exp')">
                            <h3 class="font-black text-center mb-4 text-[13px] uppercase tracking-widest ${isDark ? 'text-blue-400' : 'text-blue-900'}">2. Desarrollo y Experiencia</h3>
                            <div class="flex flex-wrap gap-2 justify-center scale-75 -my-4">
                                ${buildRadialNode('n_seleccion')} ${buildRadialNode('n_formacion')} ${buildRadialNode('n_gest_comp')} ${buildRadialNode('n_bienestar')} ${buildRadialNode('n_trabajo_social')} ${buildRadialNode('n_cultura')}
                            </div>
                        </div>

                        <!-- ESTE (3. OPERACION Y ADMIN) -->
                        <div class="absolute top-1/2 right-0 -translate-y-1/2 w-[380px] p-6 rounded-[3rem] border-2 shadow-xl hover:scale-105 transition-all duration-500 cursor-pointer ${isDark ? 'bg-emerald-950/40 border-emerald-400/30' : 'bg-emerald-50/90 border-emerald-200'}" onclick="openModal('n_operacion_admin')">
                            <h3 class="font-black text-center mb-4 text-[13px] uppercase tracking-widest ${isDark ? 'text-emerald-400' : 'text-emerald-900'}">3. Operación y Admin.</h3>
                            <div class="flex flex-wrap gap-2 justify-center scale-90">
                                ${buildRadialNode('n_nomina')} ${buildRadialNode('n_seguridad_social')} ${buildRadialNode('n_contratacion')} ${buildRadialNode('n_historias_lab')} ${buildRadialNode('n_control_ad')} ${buildRadialNode('n_compensacion')}
                            </div>
                        </div>

                    </div>
                </div>`;
        }

        function buildRadialNode(id) {
            const node = detailedNodes[id];
            if (!node) return '';
            const isHeader = id === 'n_sdo' || id === 'n_lider';
            const isGroupRoot = id === 'n_integracion' || id === 'n_desarrollo_exp' || id === 'n_operacion_admin' || id === 'n_sst_root';
            if(isGroupRoot) return ''; // We don't render group roots as single bubbles anymore, their info is on the group box
            
            return `<div onclick="event.stopPropagation(); openModal('${id}')" class="relative px-5 py-2.5 rounded-2xl shadow-lg border border-black/10 text-[9px] font-black uppercase cursor-pointer transition-all duration-300 hover:scale-[1.15] flex flex-col items-center justify-center min-h-[45px] ${isHeader ? 'w-[320px] py-5 text-[11px] ring-2 ring-black/5' : 'w-[150px]'} ${integrationMode && node.isPulse ? 'node-pulse border-amber-400' : ''} ${node.color}">
                <span class="leading-tight text-center break-words">${node.title}</span>
            </div>`;
        }

        function buildMapTemplate(isDark) {
            return `
                <div class="rounded-[3rem] p-10 border shadow-2xl transition-all duration-1000 ${isDark ? 'bg-white/5 border-white/10' : 'bg-white/90 backdrop-blur-xl border-slate-200'} overflow-x-auto">

                            <div class="flex flex-col gap-12 items-end w-1/2 relative z-10">
                                <div class="flex items-center gap-4">${buildNode('equipo_psico')} <i data-lucide="arrow-left" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('cultura')}</div>
                                <div class="flex items-center gap-4">${buildNode('empleo_talento')} <div class="w-10 border-t-2 border-dashed ${isDark ? 'border-indigo-400/30' : 'border-slate-300'}"></div> <i data-lucide="arrow-left" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('seleccion')}</div>
                                ${buildNode('desarrollo')}
                                <div class="flex flex-col items-end gap-5 p-6 rounded-[2.5rem] border-2 border-dashed transition-all ${isDark ? 'border-indigo-500/40 bg-indigo-500/5' : 'border-slate-300 bg-black/5'}">
                                    <div class="flex flex-col items-center gap-4">
                                        ${buildNode('innovacion')}
                                        <div class="h-2"></div>
                                        ${buildNode('transformacion')}
                                        <div class="flex flex-col items-center -my-2">
                                            <i data-lucide="arrow-up" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i>
                                            <div class="h-4 border-l-2 border-dashed ${isDark ? 'border-indigo-400/30' : 'border-slate-300'}"></div>
                                        </div>
                                        ${buildNode('vector_cultura')}
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col gap-12 items-start w-1/2 relative z-10">
                                <div class="flex items-center gap-4">${buildNode('competencias')} <i data-lucide="arrow-right" class="w-5 h-5 ${isDark ? 'text-indigo-400' : 'opacity-20'}"></i> ${buildNode('historias')}</div>
                                ${buildNode('nomina')}
                                <div class="flex gap-6 items-start">${buildNode('relaciones')}<div class="flex flex-col gap-4 border-l-2 pl-6 transition-colors ${isDark ? 'border-indigo-500/30' : 'border-slate-300'}">${buildNode('control')}${buildNode('negociaciones')}</div></div>
                                ${buildNode('productividad')}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function buildNode(id) {
            const node = detailedNodes[id];
            if (!node) return '';
            const isRoot = id === 'root';
            return `<div onclick="openModal('${id}')" class="relative px-6 py-3 rounded-2xl shadow-xl border border-black/10 text-[10px] font-black uppercase cursor-pointer transition-all duration-500 hover:scale-110 flex flex-col items-center justify-center min-h-[55px] ${isRoot ? 'w-[320px] py-6 text-xs ring-4 ring-white/10' : 'w-[180px]'} ${integrationMode && node.isPulse ? 'node-pulse border-amber-400' : ''} ${node.color}">
                <span class="leading-tight text-center">${node.title}</span>
            </div>`;
        }

        function buildComparison(isDark, tags) {
            return `<div class="space-y-6 fade-in px-4">
                <div class="p-8 rounded-[2.5rem] border border-slate-200 bg-slate-100/50 opacity-60">
                    <div class="text-[11px] font-black uppercase mb-4 text-slate-500">Gestión Administrativa</div>
                    <div class="flex flex-wrap gap-3">${tags.map(t => `<span class="px-4 py-2 rounded-full text-xs font-bold bg-white text-slate-800 shadow-sm">${t}</span>`).join('')}</div>

                <div class="flex justify-center -my-3 relative z-10"><div class="bg-teal-600 text-white p-3 rounded-full shadow-2xl"><i data-lucide="arrow-down" class="w-8 h-8"></i></div></div>
                <div class="p-10 rounded-[3.5rem] border-2 border-amber-500 bg-amber-500/5 shadow-2xl shadow-amber-500/10">
                    <div class="text-[11px] font-black uppercase text-amber-500 mb-4 tracking-widest text-center">Desarrollo Organizacional</div>
                    <div class="flex flex-wrap gap-3 justify-center">
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">Enfoque Diferenciado</span>
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">Agilidad de Decisión</span>
                        <span class="px-5 py-2.5 rounded-full text-sm font-black bg-amber-500 text-white shadow-xl">Especialización Metodológica</span>
                    </div>

        function buildHighlights(isDark, items) {

                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl ${isDark ? 'bg-amber-500 text-white' : 'bg-indigo-100 text-indigo-600'}">${i + 1}</div>
                    <div class="text-left"><div class="font-black text-lg ${isDark ? 'text-white' : 'text-slate-900'}">${h.label}</div><div class="text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'} font-medium">${h.desc}</div></div>

        function buildTEDVisual(isDark) {

                            <div class="flex items-center gap-5 mb-4">
                                <div class="p-4 rounded-2xl bg-indigo-500 text-white shadow-lg"><i data-lucide="monitor" class="w-8 h-8"></i></div>
                                <h3 class="text-2xl font-black uppercase tracking-tighter ${isDark ? 'text-indigo-400' : 'text-indigo-900'}">Tecnología</h3>
                            </div>
                            <p class="text-sm font-medium leading-relaxed ${isDark ? 'text-slate-400' : 'text-slate-600'}">Automatización de tareas repetitivas y digitalización total del ciclo de vida del colaborador.</p>
                        </div>
                        <div class="p-8 rounded-[3rem] border-2 border-amber-500/30 bg-amber-500/5 hover:bg-amber-500/10 transition-all group">
                            <div class="flex items-center gap-5 mb-4">
                                <div class="p-4 rounded-2xl bg-amber-500 text-white shadow-lg"><i data-lucide="compass" class="w-8 h-8"></i></div>
                                <h3 class="text-2xl font-black uppercase tracking-tighter ${isDark ? 'text-amber-400' : 'text-amber-900'}">Estrategia</h3>
                            </div>
                            <p class="text-sm font-medium leading-relaxed ${isDark ? 'text-slate-400' : 'text-slate-600'}">Alineación de objetivos institucionales con el desempeño dinámico y metodologías ágiles.</p>
                        </div>
                        <div class="p-8 rounded-[3rem] border-2 border-emerald-500/30 bg-emerald-500/5 hover:bg-emerald-500/10 transition-all group">
                            <div class="flex items-center gap-5 mb-4">
                                <div class="p-4 rounded-2xl bg-emerald-500 text-white shadow-lg"><i data-lucide="bar-chart-3" class="w-8 h-8"></i></div>
                                <h3 class="text-2xl font-black uppercase tracking-tighter ${isDark ? 'text-emerald-400' : 'text-emerald-900'}">Desempeño</h3>
                            </div>
                            <p class="text-sm font-medium leading-relaxed ${isDark ? 'text-slate-400' : 'text-slate-600'}">Resultados de alta productividad medibles con People Analytics y cultura neuronal.</p>
                        </div>
                    </div>
                    <!-- Diagrama Central -->
                    <div class="w-full md:w-1/3 flex flex-col items-center justify-center relative">
                        <div class="relative w-64 h-64">
                            <div class="absolute inset-0 rounded-full border-4 border-dashed border-slate-300 animate-[spin_20s_linear_infinite]"></div>
                            <div class="absolute inset-4 rounded-full border-4 border-indigo-500/20"></div>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="text-center">
                                    <div class="text-6xl font-black text-amber-500">TED</div>
                                    <div class="text-[10px] font-black uppercase tracking-[0.3em] ${isDark ? 'text-slate-500' : 'text-slate-400'}">Ecosistema 2026</div>
                                </div>
                            </div>
                            <!-- Satélites -->
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 p-3 bg-indigo-500 rounded-xl text-white shadow-xl animate-pulse"><i data-lucide="zap" class="w-4 h-4"></i></div>
                            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 p-3 bg-emerald-500 rounded-xl text-white shadow-xl animate-pulse"><i data-lucide="cpu" class="w-4 h-4"></i></div>

        function buildPoints(isDark, points) {
            return `<div class="grid grid-cols-1 gap-6 fade-in px-4">${points.map(p => `
                <div class="p-7 rounded-[2.5rem] flex items-center gap-6 border shadow-xl transition-all ${isDark ? 'bg-white/5 border-white/10 text-white' : 'bg-white border-slate-100 text-slate-800'}">

                    <span class="font-black text-lg text-justify leading-tight">${p}</span>
                </div>`).join('')}</div>`;
        }

        function nextSlide() { if (currentSlideIndex < slides.length - 1) { currentSlideIndex++; renderSlide(); window.scrollTo({top: 0, behavior: 'smooth'}); } }
        function prevSlide() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); window.scrollTo({top: 0, behavior: 'smooth'}); } }

        function openModal(id) {
            const node = detailedNodes[id];
            const isDark = integrationMode || slides[currentSlideIndex].isDark;
            const modal = document.getElementById('node-modal');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-title').innerText = node.title;
            document.getElementById('modal-desc').innerText = node.desc;
            document.getElementById('modal-vision').innerText = node.vision;
            document.getElementById('modal-challenge').innerText = node.challenge;
            document.getElementById('modal-tag').className = `inline-flex items-center gap-2.5 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest mb-8 ${node.color}`;

            if(isDark) {
                content.className = "relative p-10 rounded-[3.5rem] max-w-xl w-full shadow-2xl border bg-slate-900 border-amber-500/30 text-white transition-all duration-500 scale-100 opacity-100 overflow-y-auto max-h-[90vh]";
                document.getElementById('modal-challenge-box').className = "p-6 rounded-[2rem] border-l-8 border-amber-500 text-left bg-amber-500/10";
            } else {
                content.className = "relative p-10 rounded-[3.5rem] max-w-xl w-full shadow-2xl border bg-white border-white transition-all duration-500 scale-100 opacity-100 overflow-y-auto max-h-[90vh]";
                document.getElementById('modal-challenge-box').className = "p-6 rounded-[2rem] border-l-8 border-amber-500 text-left bg-amber-50";
            }
            modal.classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('node-modal');
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-90');
            document.getElementById('modal-content').classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { modal.classList.replace('flex', 'hidden'); }, 300);
        }
    </script>
</body>
</html>
